<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WB Analytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 text-slate-900 min-h-screen">
  <div class="max-w-7xl mx-auto px-4 py-10">

    <!-- HEADER -->
    <div class="mb-10 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <h1 class="text-3xl font-bold">WB Analytics</h1>
        <p class="mt-1 text-slate-500">Аналитика отчетов Wildberries</p>
      </div>

      <div class="flex flex-wrap gap-3">
        <a href="/products/" class="px-5 py-2 rounded-xl bg-white shadow-sm border border-slate-200 hover:shadow-md hover:border-slate-300 transition text-sm font-medium">
          Товары
        </a>
        <a href="/report/history/" class="px-5 py-2 rounded-xl bg-white shadow-sm border border-slate-200 hover:shadow-md hover:border-slate-300 transition text-sm font-medium">
          История
        </a>
      </div>
    </div>

    <!-- UPLOAD -->
    <div class="mb-8 rounded-3xl bg-white p-6 shadow-lg border border-slate-200">
      <div class="flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h2 class="text-xl font-semibold">Загрузка отчёта</h2>
          <p class="text-slate-500 mt-1">Excel файл Wildberries (.xls, .xlsx)</p>
        </div>
      </div>

      <div class="mt-6 grid gap-4">
        <div id="reportNameWrapper" class="hidden">
          <label class="block">
            <span class="text-slate-700 font-semibold">Название отчёта</span>
            <input
              id="reportNameInput"
              type="text"
              class="mt-2 block w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100"
              placeholder="Например, Отчёт за неделю"
            />
          </label>
        </div>

        <div class="grid gap-4 md:grid-cols-[1fr_auto] items-end">
          <div
            id="dropzone"
            class="group cursor-pointer rounded-2xl border-2 border-dashed border-slate-300 bg-slate-50 p-6 text-center transition hover:border-indigo-400 hover:bg-indigo-50"
          >
            <p id="dropText" class="text-lg font-medium text-slate-700">Перетащи файл сюда или нажми для выбора</p>
            <p id="fileName" class="mt-2 text-sm text-slate-500">Файл не выбран</p>
            <input id="fileInput" type="file" accept=".xls,.xlsx" class="hidden" />
          </div>

        </div>
      </div>

      <div class="mt-5 flex flex-wrap gap-3">
        <button id="uploadButton" class="inline-flex min-w-[10rem] items-center justify-center rounded-2xl bg-black px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">
          Загрузить
        </button>
        <button id="clearButton" class="inline-flex min-w-[10rem] items-center justify-center rounded-2xl bg-slate-200 px-6 py-3 text-sm font-semibold text-slate-900 transition hover:bg-slate-300">
          Очистить
        </button>
        <button id="saveButton" class="inline-flex min-w-[10rem] items-center justify-center rounded-2xl bg-slate-900 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-50" disabled>
          Сохранить отчёт
        </button>
      </div>

      <div id="message" class="mt-5 min-h-[2rem] text-sm text-slate-600"></div>
    </div>

    <!-- RESULTS -->
    <div id="results" class="grid gap-6"></div>

    <!-- DETAILS TABLE TOGGLE -->
    <div id="detailsToggleContainer" class="mt-8 hidden">
      <button id="toggleDetailsBtn" class="inline-flex items-center justify-center rounded-2xl bg-indigo-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-indigo-500">
        <span id="toggleDetailsBtnText">Показать таблицу</span>
      </button>
    </div>

    <!-- DETAILS TABLE -->
    <div id="detailsSection" class="mt-8 rounded-3xl bg-white p-6 shadow-lg border border-slate-200 hidden">
      <h2 class="text-2xl font-semibold mb-4">Детализация операций</h2>

      <!-- Filters -->
      <div class="mb-6 grid gap-4 md:grid-cols-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Поиск по артикулу</label>
          <input id="searchInput" type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200" placeholder="Введите артикул..." />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Партнер</label>
          <select id="partnerFilter" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200">
            <option value="">Все</option>
            <option value="a">A</option>
            <option value="b">B</option>
            <option value="c">C</option>
            <option value="d">D</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Тип</label>
          <select id="typeFilter" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200">
            <option value="">Все</option>
            <option value="продажа">Продажа</option>
            <option value="возврат">Возврат</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Прибыль</label>
          <select id="profitFilter" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200">
            <option value="">Все</option>
            <option value="positive">Прибыльные (>0)</option>
            <option value="negative">Убыточные (<0)</option>
          </select>
        </div>
      </div>

      <!-- Row Count -->
      <div class="mb-4 text-sm text-slate-600">
        Показано строк: <span id="rowCount">0</span>
      </div>

      <!-- Table -->
      <div class="overflow-y-auto max-h-96 border border-slate-200 rounded-lg">
        <table class="min-w-full divide-y divide-slate-200">
          <thead class="bg-slate-50 sticky top-0">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Артикул</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Партнер</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Тип</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider cursor-pointer hover:bg-slate-100" data-sort="sale_amount">Продажи</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider cursor-pointer hover:bg-slate-100" data-sort="wb_amount">WB</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider cursor-pointer hover:bg-slate-100" data-sort="delivery">Доставка</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider cursor-pointer hover:bg-slate-100" data-sort="fines">Штрафы</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider cursor-pointer hover:bg-slate-100" data-sort="deductions">Удержания</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider cursor-pointer hover:bg-slate-100" data-sort="cost">Себестоимость</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider cursor-pointer hover:bg-slate-100" data-sort="profit">Прибыль</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="bg-white divide-y divide-slate-200">
            <!-- Rows will be inserted here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const uploadButton = document.getElementById('uploadButton');
    const saveButton = document.getElementById('saveButton');
    const clearButton = document.getElementById('clearButton');
    const reportNameWrapper = document.getElementById('reportNameWrapper');
    const reportNameInput = document.getElementById('reportNameInput');
    const fileInput = document.getElementById('fileInput');
    const resultsNode = document.getElementById('results');
    const messageNode = document.getElementById('message');
    const dropzone = document.getElementById('dropzone');
    const dropText = document.getElementById('dropText');
    const fileNameNode = document.getElementById('fileName');

    let lastReportResult = null;
    let originalDetails = [];
    let filteredDetails = [];
    let sortState = { key: null, direction: 'desc' };

    const initialReportData = {{ initial_report_json|default:'null'|safe }};
    const initialReportName = {{ initial_report_name_json|default:'null'|safe }};
    const initialFileName = {{ initial_file_name_json|default:'null'|safe }};

    const formatMoney = (value) => {
      const num = Number(value || 0);
      return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB' }).format(num);
    };

    function showMessage(text, type = 'info') {
      messageNode.textContent = text;
      messageNode.className = type === 'error'
        ? 'mt-5 min-h-[2rem] text-sm text-red-600'
        : 'mt-5 min-h-[2rem] text-sm text-slate-600';
    }

    function updateFileUI(file) {
      if (!file) {
        fileNameNode.textContent = 'Файл не выбран';
        dropText.textContent = 'Перетащи файл сюда или нажми для выбора';
        return;
      }
      fileNameNode.textContent = file.name;
      dropText.textContent = 'Файл выбран';
    }

    function stat(title, value) {
      const displayTitle = title === 'Комиссия' || title === 'РљРѕРјРёСЃСЃРёСЏ' ? 'УСН' : title;
      return `
        <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
          <p class="text-sm font-semibold text-slate-700">${displayTitle}</p>
          <p class="mt-2 text-lg font-semibold text-slate-900">${formatMoney(value)}</p>
        </div>
      `;
    }

    function renderOverallSummary(data) {
      const overall = {
        storage_amount: data.overall_storage_amount || 0,
        receiving_amount: data.overall_receiving_amount || 0,
        usn_amount: Object.values(data.partners || {}).reduce((sum, stats) => sum + Number(stats.commission || 0), 0),
      };

      const section = document.createElement('section');
      section.className = 'rounded-3xl border border-slate-200 bg-white p-6 shadow-lg';
      section.innerHTML = `
        <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <p class="text-sm uppercase tracking-[0.25em] text-indigo-600 font-semibold">Общие суммы</p>
            <h2 class="mt-2 text-2xl font-semibold text-slate-900">Хранение и операции на приемке</h2>
          </div>
        </div>
        <div class="mt-6 grid gap-4 md:grid-cols-2">
          ${stat('Хранение (всего)', overall.storage_amount)}
          ${stat('Операции на приемке (всего)', overall.receiving_amount)}
        </div>
      `;
      const statsGrid = section.querySelector('.mt-6.grid');
      if (statsGrid) {
        statsGrid.classList.remove('md:grid-cols-2');
        statsGrid.classList.add('md:grid-cols-3');
        statsGrid.insertAdjacentHTML('beforeend', stat('УСН (всего)', overall.usn_amount));
      }
      return section;
    }

    function renderProductCosts(data) {
      const missing = data.missing_products || [];
      const section = document.createElement('section');
      section.className = 'rounded-3xl border border-slate-200 bg-white p-6 shadow-lg';
      section.innerHTML = `
        <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <p class="text-sm uppercase tracking-[0.25em] text-emerald-600 font-semibold">Товары</p>
            <h2 class="mt-2 text-2xl font-semibold text-slate-900">Себестоимость по продажам и возвратам</h2>
          </div>
        </div>

        <div class="mt-6 grid gap-4 md:grid-cols-2">
          ${stat('Себестоимость продаж', data.product_cost_sales)}
          ${stat('Себестоимость возвратов', data.product_cost_returns)}
        </div>

        ${missing.length ? `
          <div class="mt-6 rounded-2xl border border-amber-200 bg-amber-50 p-4">
            <p class="font-semibold text-amber-700">Не найденные товары</p>
            <p class="mt-2 text-sm text-slate-700 leading-6">${missing.join(', ')}</p>
          </div>
        ` : ''}
      `;
      return section;
    }

    function renderPartnerCard(partner, stats, partnerCosts) {
      const profit =
        (stats.sales_amount || 0)
        - (stats.returns_amount || 0)
        - (stats.delivery_amount || 0)
        - (stats.commission || 0)
        - (stats.fines_amount || 0)
        - (stats.withholdings_amount || 0)
        - (partnerCosts.sales || 0)
        - (partnerCosts.returns || 0);

      const profitClass = profit >= 0 ? 'text-emerald-600' : 'text-rose-600';

      const card = document.createElement('article');
      card.className = 'rounded-3xl border border-slate-200 bg-white p-6 shadow-lg';
      card.innerHTML = `
        <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
          <div>
            <p class="text-sm uppercase tracking-[0.25em] text-slate-500 font-semibold">Партнёр ${partner.toUpperCase()}</p>
            <h2 class="mt-2 text-2xl font-semibold text-slate-900">Итог по партнёру ${partner.toUpperCase()}</h2>
          </div>
          <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
            <p class="text-xs uppercase tracking-[0.2em] text-slate-500 font-semibold">Прибыль</p>
            <p class="mt-1 text-2xl font-bold ${profitClass}">${formatMoney(profit)}</p>
          </div>
        </div>

        <div class="mt-6 grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
          ${stat('Продажи', stats.sales_amount)}
          ${stat('Возвраты', stats.returns_amount)}
          ${stat('Комиссия', stats.commission)}
          ${stat('Итог WB', stats.total_amount)}
          ${stat('Доставка', stats.delivery_amount)}
          ${stat('WB реализовал (Пр)', stats.wb_realized_amount)}
          ${stat('Штрафы', stats.fines_amount)}
          ${stat('Удержания', stats.withholdings_amount)}
          ${stat('Себестоимость продаж', partnerCosts.sales)}
          ${stat('Себестоимость возвратов', partnerCosts.returns)}
        </div>
      `;
      return card;
    }

    function renderResults(data) {
      resultsNode.innerHTML = '';
      resultsNode.appendChild(renderOverallSummary(data));
      resultsNode.appendChild(renderProductCosts(data));
      renderDetailsSection(data);

      const partners = data.partners || {};
      for (const partner of ['a', 'b', 'c', 'd']) {
        const stats = partners[partner] || {};
        const partnerCosts = data.partner_costs ? (data.partner_costs[partner] || {}) : {};
        resultsNode.appendChild(renderPartnerCard(partner, stats, partnerCosts));
      }
    }

    function renderDetailsSection(data) {
      const detailsSection = document.getElementById('detailsSection');
      const toggleContainer = document.getElementById('detailsToggleContainer');
      if (!detailsSection || !toggleContainer) return;

      if (data.details && data.details.length > 0) {
        originalDetails = data.details;
        toggleContainer.classList.remove('hidden');
        // Keep table hidden by default
        detailsSection.classList.add('hidden');
        bindDetailsControls();
        const filtered = sortData(filterData());
        renderTable(filtered);
      } else {
        toggleContainer.classList.add('hidden');
        detailsSection.classList.add('hidden');
      }
    }

    function filterData() {
      const searchInput = document.getElementById('searchInput');
      const partnerSelect = document.getElementById('partnerFilter');
      const typeSelect = document.getElementById('typeFilter');
      const profitSelect = document.getElementById('profitFilter');

      const searchValue = (searchInput ? searchInput.value : '').trim().toLowerCase();
      const partnerValue = partnerSelect ? partnerSelect.value : '';
      const typeValue = typeSelect ? typeSelect.value : '';
      const profitValue = profitSelect ? profitSelect.value : '';

      filteredDetails = originalDetails.filter(row => {
        const articleMatch = !searchValue || (row.article || '').toLowerCase().includes(searchValue);
        const partnerMatch = !partnerValue || row.partner === partnerValue;
        const typeMatch = !typeValue || row.type === typeValue;
        const profit = Number(row.profit || 0);
        const profitMatch = !profitValue ||
          (profitValue === 'positive' && profit > 0) ||
          (profitValue === 'negative' && profit < 0);

        return articleMatch && partnerMatch && typeMatch && profitMatch;
      });

      return filteredDetails;
    }

    function sortData(data) {
      if (!sortState.key) return data;

      return [...data].sort((a, b) => {
        let aVal = a[sortState.key];
        let bVal = b[sortState.key];

        if (typeof aVal === 'string') {
          aVal = aVal.toLowerCase();
          bVal = bVal.toLowerCase();
        }

        if (aVal < bVal) return sortState.direction === 'asc' ? -1 : 1;
        if (aVal > bVal) return sortState.direction === 'asc' ? 1 : -1;
        return 0;
      });
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      const rowCount = document.getElementById('rowCount');

      if (!tbody || !rowCount) return;

      rowCount.textContent = data.length;

      tbody.innerHTML = data.map(row => {
        const profitClass = (row.profit || 0) > 0 ? 'text-green-600' : (row.profit || 0) < 0 ? 'text-red-600' : 'text-slate-900';

        return `
          <tr class="hover:bg-slate-50">
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900">${row.article || ''}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900">${(row.partner || '').toUpperCase()}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900">${row.type || ''}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900">${formatMoney(row.sale_amount)}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900">${formatMoney(row.wb_amount)}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900">${formatMoney(row.delivery)}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900">${formatMoney(row.fines)}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900">${formatMoney(row.deductions)}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900">${formatMoney(row.cost)}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900 font-semibold ${profitClass}">${formatMoney(row.profit)}</td>
          </tr>
        `;
      }).join('');
    }

    function bindDetailsControls() {
      const searchInput = document.getElementById('searchInput');
      const partnerSelect = document.getElementById('partnerFilter');
      const typeSelect = document.getElementById('typeFilter');
      const profitSelect = document.getElementById('profitFilter');
      const sortHeaders = document.querySelectorAll('th[data-sort]');

      if (searchInput && !searchInput.dataset.bound) {
        searchInput.addEventListener('input', () => {
          const filtered = sortData(filterData());
          renderTable(filtered);
        });
        searchInput.dataset.bound = 'true';
      }

      [partnerSelect, typeSelect, profitSelect].forEach(select => {
        if (select && !select.dataset.bound) {
          select.addEventListener('change', () => {
            const filtered = sortData(filterData());
            renderTable(filtered);
          });
          select.dataset.bound = 'true';
        }
      });

      sortHeaders.forEach(header => {
        if (header.dataset.bound) return;
        header.addEventListener('click', () => {
          const key = header.getAttribute('data-sort');
          if (sortState.key === key) {
            sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
          } else {
            sortState.key = key;
            sortState.direction = 'asc';
          }
          const filtered = sortData(filterData());
          renderTable(filtered);
        });
        header.dataset.bound = 'true';
      });
    }

    if (initialReportData && !savedReport) {
      lastReportResult = initialReportData;
      renderResults(initialReportData);
      saveButton.disabled = false;
      if (initialReportName) {
        reportNameWrapper.classList.remove('hidden');
        reportNameInput.value = initialReportName;
      }
    }

    // Load from localStorage after all functions are defined
    const savedReport = localStorage.getItem('wbReportData');
    if (savedReport) {
      try {
        console.log('Loading report, size:', savedReport.length);
        lastReportResult = JSON.parse(savedReport);
        renderResults(lastReportResult);
        saveButton.disabled = false;
        console.log('Report loaded from localStorage');
      } catch (e) {
        console.error('Failed to load saved report:', e);
      }
    } else if (initialReportData) {
      lastReportResult = initialReportData;
      renderResults(initialReportData);
      saveButton.disabled = false;
      if (initialReportName) {
        reportNameWrapper.classList.remove('hidden');
        reportNameInput.value = initialReportName;
      }
    }

    updateFileUI(null);

    dropzone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      setSelectedFile(fileInput.files[0]);
    });

    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('bg-indigo-50', 'border-indigo-400');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('bg-indigo-50', 'border-indigo-400');
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('bg-indigo-50', 'border-indigo-400');

      const files = e.dataTransfer.files;
      if (files && files.length) {
        try {
          fileInput.files = files;
        } catch (err) {
          // some browsers may block direct assignment
        }
        updateFileUI(files[0]);
      }
    });

    uploadButton.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) {
        showMessage('Выберите Excel-файл перед отправкой.', 'error');
        return;
      }

      showMessage('Идёт загрузка и обработка файла...', 'info');

      const formData = new FormData();
      formData.append('file', file);

      try {
        const response = await fetch('/upload/', {
          method: 'POST',
          body: formData,
        });

        const data = await response.json();

        if (!response.ok) {
          console.error(data.trace || data.error);
          showMessage(data.error || 'Ошибка при загрузке файла.', 'error');
          return;
        }

        renderResults(data);
        renderDetailsSection(data);
        lastReportResult = data;
        try {
          const dataStr = JSON.stringify(data);
          console.log('Saving report, size:', dataStr.length);
          localStorage.setItem('wbReportData', dataStr);
          console.log('Report saved to localStorage');
        } catch (e) {
          console.error('Failed to save report to localStorage:', e);
        }
        saveButton.disabled = false;
        showMessage('Файл успешно обработан.', 'info');
      } catch (error) {
        console.error(error);
        showMessage('Ошибка сети или сервера. Повторите попытку.', 'error');
      }
    });

    saveButton.addEventListener('click', async () => {
      if (reportNameWrapper.classList.contains('hidden')) {
        reportNameWrapper.classList.remove('hidden');
        reportNameInput.focus();
        return;
      }

      if (!lastReportResult) {
        showMessage('Сначала загрузите файл, чтобы сохранить отчёт.', 'error');
        return;
      }

      const reportName = reportNameInput.value.trim();
      const fileName = fileInput.files[0] ? fileInput.files[0].name : (initialFileName || '');

      if (!reportName) {
        showMessage('Введите название отчёта перед сохранением.', 'error');
        reportNameInput.focus();
        return;
      }

      showMessage('Сохранение отчёта...', 'info');

      try {
        const response = await fetch('/report/save/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            report_name: reportName,
            file_name: fileName,
            data: lastReportResult,
          }),
        });


        const result = await response.json();

        if (!response.ok) {
          showMessage(result.error || 'Ошибка при сохранении отчёта.', 'error');
          return;
        }

        showMessage('Отчёт сохранён.', 'info');
        saveButton.disabled = true;
      } catch (error) {
        console.error(error);
        showMessage('Ошибка сети или сервера. Повторите попытку.', 'error');
      }
    });

    clearButton.addEventListener('click', () => {
      lastReportResult = null;
      originalDetails = [];
      filteredDetails = [];
      sortState = { key: null, direction: 'desc' };
      resultsNode.innerHTML = '';
      document.getElementById('detailsSection').classList.add('hidden');
      document.getElementById('detailsToggleContainer').classList.add('hidden');
      reportNameWrapper.classList.add('hidden');
      reportNameInput.value = '';
      fileInput.value = '';
      updateFileUI(null);
      saveButton.disabled = true;
      try {
        localStorage.removeItem('wbReportData');
        console.log('Report cleared from localStorage');
      } catch (e) {
        console.error('Failed to clear localStorage:', e);
      }
      showMessage('Отчёт очищен.', 'info');
    });

    // Toggle details table visibility
    const toggleDetailsBtn = document.getElementById('toggleDetailsBtn');
    const toggleDetailsBtnText = document.getElementById('toggleDetailsBtnText');
    const detailsSection = document.getElementById('detailsSection');
    
    if (toggleDetailsBtn) {
      toggleDetailsBtn.addEventListener('click', () => {
        if (detailsSection.classList.contains('hidden')) {
          detailsSection.classList.remove('hidden');
          toggleDetailsBtnText.textContent = 'Скрыть таблицу';
        } else {
          detailsSection.classList.add('hidden');
          toggleDetailsBtnText.textContent = 'Показать таблицу';
        }
      });
    }

    function setSelectedFile(file) {
      updateFileUI(file);
    }
  </script>
</body>
</html>
