<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Товар {{ product.sku }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <div class="max-w-5xl mx-auto px-4 py-10">
    <div class="mb-8 rounded-3xl border border-slate-200 bg-white p-8 shadow-xl shadow-slate-200/80">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <h1 class="text-3xl font-semibold">Артикул {{ product.sku }}</h1>
          <p class="mt-2 text-slate-600">Все размеры и себестоимость для выбранного артикула.</p>
        </div>
        <div class="flex flex-wrap gap-3">
          <a href="/products/" class="rounded-2xl border border-slate-300 bg-white px-5 py-3 text-sm text-slate-900 transition hover:border-indigo-500 hover:text-indigo-700">Назад к товарам</a>
          <a href="/products/{{ product.pk }}/edit/" class="rounded-2xl bg-indigo-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-indigo-500">Редактировать</a>
        </div>
      </div>

      <div class="mt-8 overflow-x-auto rounded-3xl border border-slate-200 bg-slate-50 p-4">
        {% if variants %}
        <table class="min-w-full border-separate border-spacing-0">
          <thead>
            <tr class="text-left text-sm uppercase tracking-[0.24em] text-slate-500">
              <th class="px-4 py-3">Размер</th>
              <th class="px-4 py-3">Себестоимость</th>
            </tr>
          </thead>
          <tbody>
            {% for variant in variants %}
            <tr class="border-t border-slate-200 hover:bg-white">
              <td class="px-4 py-3 text-slate-900">{{ variant.size|default:'—' }}</td>
              <td class="px-4 py-3 text-slate-900">{{ variant.cost }}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
        {% else %}
        <div class="rounded-3xl border border-slate-200 bg-slate-50 p-8 text-slate-600">
          У этого артикула нет размеров.
        </div>
        {% endif %}
      </div>
    </div>
  </div>
</body>
</html>
