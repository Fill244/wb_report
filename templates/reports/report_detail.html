<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Отчёт {{ report.title|default:'без названия' }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <div class="max-w-6xl mx-auto px-4 py-10">
    <div class="mb-8 rounded-3xl border border-slate-200 bg-white p-8 shadow-xl shadow-slate-200/80">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <h1 class="text-3xl font-semibold">{{ report.title|default:'Отчёт' }}</h1>
          <p class="mt-2 text-slate-600">Сохранён {{ report.created_at|date:'d.m.Y H:i' }}. Файл: {{ report.file_name|default:'не указан' }}.</p>
        </div>
        <div class="flex flex-wrap gap-3">
          <a href="/report/history/" class="rounded-2xl border border-slate-300 bg-white px-5 py-3 text-sm text-slate-900 transition hover:border-indigo-500 hover:text-indigo-700">Назад к истории</a>
          <a href="/" class="rounded-2xl bg-black px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">Новая загрузка</a>
        </div>
      </div>

      <div class="mt-8 rounded-3xl border border-slate-200 bg-slate-50 p-6">
        <h2 class="text-xl font-semibold text-slate-900">Данные отчёта</h2>
        <pre class="mt-4 overflow-x-auto rounded-3xl border border-slate-200 bg-white p-4 text-sm text-slate-900">{{ report_json }}</pre>
      </div>
    </div>
  </div>
</body>
</html>
